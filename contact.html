<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - MPC Chauffage</title>
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="bg-gray-50">
    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo-text">MPC Chauffage</a>
            <nav class="main-nav">
                <a href="index.html">Accueil</a>
                <a href="services.html">Nos services</a>
                <a href="contact.html" class="active">Contact</a>
            </nav>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </header>

    <main>
        <section class="py-20">
            <div class="container max-w-7xl">
                <div class="contact-grid shadow-lg rounded-2xl overflow-hidden">
                    <!-- Image -->
                    <div class="contact-img-container bg-gray-100">
                        <img src="assets/img/general/contact.webp" alt="Contact MPC Chauffage" class="contact-img" />
                    </div>

                    <!-- Formulaire -->
                    <div class="contact-form-container bg-white p-10">
                        <h2 class="text-3xl font-bold mb-6 text-gray-900">Contactez-nous</h2>
                        <form id="contactForm" class="contact-form">
                            <div class="form-group">
                                <label for="name">Nom complet</label>
                                <input type="text" id="name" class="form-control" required />
                            </div>
                            <div class="form-group">
                                <label for="email">Adresse e-mail</label>
                                <input type="email" id="email" class="form-control" required />
                            </div>
                            <div class="form-group">
                                <label for="phone">Téléphone</label>
                                <input type="tel" id="phone" class="form-control" required />
                            </div>
                            <div class="form-group">
                                <label for="message">Votre message</label>
                                <textarea id="message" rows="4" class="form-control" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-full">Envoyer ma demande</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <!-- Coordonnées -->
        <section class="contact-info bg-white text-blue-600 py-12">
            <div class="container max-w-6xl">
                <div class="grid md-grid-cols-3 text-center gap-8">
                    <div class="info-block">
                        <div class="info-icon">📞</div>
                        <p class="info-title">06 85 71 70 13</p>
                        <p class="info-desc">Appelez-nous directement</p>
                    </div>
                    <div class="info-block">
                        <div class="info-icon">✉</div>
                        <p class="info-title">contact@mpc-chauffage.fr</p>
                        <p class="info-desc">Réponse sous 24h</p>
                    </div>
                    <div class="info-block">
                        <div class="info-icon">🕒</div>
                        <p class="info-title">Lun - Ven : 8h00 - 18h00</p>
                        <p class="info-desc">Intervention rapide en IDF</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <p>&copy; 2026 MPC Chauffage. Tous droits réservés.</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
